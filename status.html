<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track your booking — B&amp;K General Services</title>
<meta name="description" content="Check the status of your B&K General Services booking and pay your quote online." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="icon" href="logo.png" sizes="any" type="image/png">
<link rel=""apple-touch-icon" sizes="180x180" href="appletouch.png" type="image/png">

<style>
  :root {
    --ink:#17211b; --ink-soft:#24332a; --paper:#f6f2e9; --card:#fff;
    --marigold:#f4a300; --marigold-deep:#d98c00; --rust:#b9461f; --moss:#2f5d3e; --blue:#2f6db0;
    --line:#e4dccb; --muted:#6f6757; --muted-ink:#aab6ab; --danger:#b3261e;
    --radius:16px; --shadow:0 1px 2px rgba(23,33,27,.06), 0 12px 30px -14px rgba(23,33,27,.22);
    --shadow-lg:0 30px 60px -24px rgba(23,33,27,.45);
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:"Hanken Grotesk",system-ui,sans-serif; font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100vh; }
  h1,h2,h3 { font-family:"Bricolage Grotesque","Hanken Grotesk",sans-serif; font-weight:800; letter-spacing:-0.02em; margin:0; }
  .amp { color:var(--rust); }
  .wrap { max-width:620px; margin:0 auto; padding:0 22px; }

  /* Top bar */
  .topbar { border-bottom:1px solid var(--line); background:var(--paper); }
  .topbar__in { display:flex; align-items:center; justify-content:space-between; height:64px; gap:14px; }
  .brand { display:flex; align-items:baseline; gap:9px; text-decoration:none; }
  .brand__mark { font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:24px; letter-spacing:-0.03em; }
  .brand__sub { font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .home-link { display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted); font-weight:700; font-size:14px; transition:color .15s var(--ease); }
  .home-link:hover { color:var(--ink); }

  main { padding:48px 0 80px; }
  .lead { text-align:center; margin-bottom:30px; }
  .lead h1 { font-size:clamp(30px,5vw,42px); }
  .lead p { color:var(--muted); margin:12px 0 0; font-size:16px; }

  .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:clamp(22px,4vw,32px); }

  .field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
  label.lbl { font-size:13px; font-weight:700; color:var(--ink); }
  .input { font-family:inherit; font-size:16px; color:var(--ink); background:#fbf9f3; border:1.5px solid var(--line); border-radius:11px; padding:13px 14px; width:100%; transition:border-color .15s var(--ease), box-shadow .15s var(--ease), background .15s var(--ease); }
  .input::placeholder { color:#a59c89; }
  .input:focus { outline:none; background:#fff; border-color:var(--marigold-deep); box-shadow:0 0 0 4px rgba(244,163,0,.18); }
  .ref-input { text-transform:uppercase; letter-spacing:.08em; font-variant-numeric:tabular-nums; }

  .btn { font-family:inherit; font-weight:700; font-size:16px; border:none; border-radius:999px; padding:14px 26px; cursor:pointer; transition:transform .15s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease); display:inline-flex; align-items:center; justify-content:center; gap:9px; text-decoration:none; }
  .btn--block { width:100%; }
  .btn--ink { background:var(--ink); color:#fff; box-shadow:0 12px 26px -14px rgba(23,33,27,.6); }
  .btn--ink:hover:not(:disabled) { background:var(--ink-soft); transform:translateY(-2px); }
  .btn--pay { background:var(--marigold); color:#20160a; box-shadow:0 10px 24px -10px rgba(244,163,0,.7); font-size:17px; padding:16px 28px; }
  .btn--pay:hover { background:#ffb41f; transform:translateY(-2px); }
  .btn--ghost { background:transparent; border:1.5px solid var(--line); color:var(--ink); }
  .btn--ghost:hover { border-color:var(--ink); background:#faf7f0; }
  .btn:disabled { opacity:.65; cursor:progress; }
  .spinner { width:17px; height:17px; border:2.5px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .formerror { display:none; margin-top:15px; padding:12px 15px; border-radius:11px; background:#fdecea; border:1px solid #f3c7c2; color:var(--danger); font-size:14.5px; font-weight:600; }
  .formerror--show { display:block; }
  .forgot { text-align:center; margin-top:16px; }
  .linklike { background:transparent; border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px; color:var(--marigold-deep); padding:6px; }
  .linklike:hover { color:var(--rust); text-decoration:underline; }
  .recall-note { display:none; margin-top:14px; padding:13px 15px; border-radius:11px; background:#e7efe9; border:1px solid #cfe0d4; color:#2f5d3e; font-size:14px; line-height:1.5; text-align:center; }
  .recall-note--show { display:block; }

  /* Result */
  .result { display:none; }
  .result--show { display:block; animation:rise .45s var(--ease) both; }
  @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
  .result__head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:22px; }
  .result__svc { font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:24px; }
  .result__ref { font-size:13px; color:var(--muted); font-weight:700; margin-top:3px; }
  .badge { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; white-space:nowrap; flex:none; }
  .b-reviewing { background:#fdf0d6; color:#9a6b00; }
  .b-quoted { background:#e4eefb; color:#235691; }
  .b-paid { background:#dff0e4; color:#1f7a44; }
  .b-scheduled { background:#e7efe9; color:#2f5d3e; }
  .b-completed { background:#eceef0; color:#475259; }
  .b-cancelled { background:#fbe4e2; color:#a3271f; }

  /* Timeline */
  .timeline { display:flex; margin:6px 0 24px; }
  .tl-step { flex:1; text-align:center; position:relative; }
  .tl-step::before { content:""; position:absolute; top:11px; left:-50%; width:100%; height:2px; background:var(--line); z-index:0; }
  .tl-step:first-child::before { display:none; }
  .tl-dot { position:relative; z-index:1; width:24px; height:24px; border-radius:50%; background:#fff; border:2px solid var(--line); margin:0 auto 8px; display:grid; place-items:center; color:transparent; transition:all .2s var(--ease); }
  .tl-label { font-size:11.5px; font-weight:700; color:var(--muted); letter-spacing:.02em; }
  .tl-step.done .tl-dot { background:var(--moss); border-color:var(--moss); color:#fff; }
  .tl-step.done .tl-label { color:var(--ink); }
  .tl-step.done::before { background:var(--moss); }
  .tl-step.current .tl-dot { background:var(--marigold); border-color:var(--marigold); color:#20160a; box-shadow:0 0 0 5px rgba(244,163,0,.18); }
  .tl-step.current .tl-label { color:var(--ink); }

  .statusbox { background:#faf7f0; border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px; }
  .statusbox h3 { font-size:17px; margin-bottom:5px; }
  .statusbox p { margin:0; color:var(--muted); font-size:14.5px; }
  .quote { background:var(--ink); color:#fff; border-radius:12px; padding:20px; margin-bottom:16px; text-align:center; }
  .quote__label { font-size:13px; color:var(--muted-ink); font-weight:600; }
  .quote__price { font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:34px; letter-spacing:-0.02em; margin-top:4px; }
  .paybox { margin-bottom:18px; }
  .paybox__note { font-size:14px; line-height:1.55; color:var(--muted); margin:0 0 14px; }
  .paybox__note strong { color:var(--ink); }
  .paybtns { display:flex; flex-direction:column; gap:10px; }
  .paybtns .btn { width:100%; }
  .btn--venmo { background:#3d95ce; color:#fff; }
  .btn--venmo:hover { background:#347fb0; transform:translateY(-2px); }
  .btn--cashapp { background:#00d632; color:#05331a; }
  .btn--cashapp:hover { background:#00bf2d; transform:translateY(-2px); }
  .btn--cash { background:transparent; border:1.5px solid var(--line); color:var(--ink); cursor:pointer; font-family:inherit; }
  .btn--cash:hover { border-color:var(--ink); background:#faf7f0; }
  .cash-note { display:none; margin-top:12px; padding:13px 15px; border-radius:11px; background:#e7efe9; border:1px solid #cfe0d4; color:#2f5d3e; font-size:14px; line-height:1.5; }
  .cash-note--show { display:block; }
  .cash-note strong { color:#17211b; }
  .meta-line { font-size:14px; color:var(--muted); margin-top:2px; }
  .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:6px; }

  .foot { border-top:1px solid var(--line); padding:24px 0 40px; }
  .foot__in { display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; color:var(--muted); font-size:13.5px; }
  .foot__brand { font-weight:700; color:var(--ink); }

  :focus-visible { outline:3px solid var(--marigold-deep); outline-offset:2px; border-radius:8px; }
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.001ms!important;transition-duration:.001ms!important;} }
  @media (max-width:440px){ .tl-label{font-size:10px;} }
</style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar__in">
      <a class="brand" href="/" aria-label="B&amp;K General Services home">
        <span class="brand__mark">B<span class="amp">&amp;</span>K</span>
        <span class="brand__sub">General Services</span>
      </a>
      <a class="home-link" href="/">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
        Book a service
      </a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="lead">
        <h1>Track your booking</h1>
        <p>Enter your email and the reference number from your confirmation.</p>
      </div>

      <!-- Lookup form -->
      <div class="panel" id="lookupPanel">
        <div class="field">
          <label class="lbl" for="email">Email</label>
          <input class="input" id="email" type="email" autocomplete="email" placeholder="you@email.com" />
        </div>
        <div class="field">
          <label class="lbl" for="ref">Reference number</label>
          <input class="input ref-input" id="ref" type="text" placeholder="e.g. 3f9a2b71" />
        </div>
        <button class="btn btn--ink btn--block" id="check">
          <span class="spinner" id="spinner"></span>
          <span id="checkLabel">Check status</span>
        </button>
        <div class="formerror" id="formError" role="alert"></div>
        <div class="forgot">
          <button type="button" class="linklike" id="forgotBtn">Forgot your reference number?</button>
        </div>
        <div class="recall-note" id="recallNote"></div>
      </div>

      <!-- Result -->
      <div class="panel result" id="resultPanel" aria-live="polite">
        <div class="result__head">
          <div>
            <div class="result__svc" id="rSvc">Service</div>
            <div class="result__ref" id="rRef">#000000</div>
            <div class="meta-line" id="rDate"></div>
          </div>
          <span class="badge" id="rBadge"></span>
        </div>

        <div class="timeline" id="timeline"></div>

        <div id="quoteBox"></div>
        <div class="statusbox" id="statusBox"></div>

        <div class="actions">
          <button class="btn btn--ghost" id="again">Check another booking</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="foot">
    <div class="wrap foot__in">
      <span><span class="foot__brand">B&amp;K General Services</span> — Saratoga Springs, Utah</span>
      <span>Questions? Call (714) 594-9526</span>
    </div>
  </footer>

<script type="module">
  const $ = (s) => document.querySelector(s);

  // 👇 Your payment handles (change here if they ever update)
  const VENMO_URL = "https://venmo.com/u/bodlink007";
  const CASHAPP_URL = "https://cash.app/$BPlayzGamezYT";

  // Status presentation + customer-facing messages
  const STATUS = {
    reviewing: { label: "Reviewing", cls: "b-reviewing", title: "We're reviewing your request", msg: "We'll work out the details and send you a price quote shortly. Check back soon." },
    quoted:    { label: "Quoted",    cls: "b-quoted",    title: "Your quote is ready", msg: "Here's your price. Pay with Venmo or Cash App below to lock in your booking." },
    paid:      { label: "Paid",      cls: "b-paid",      title: "Payment received — thank you!", msg: "You're all set. We'll be in touch to confirm the schedule." },
    scheduled: { label: "Scheduled", cls: "b-scheduled", title: "Your service is scheduled", msg: "We've got you on the calendar. See you then!" },
    completed: { label: "Completed", cls: "b-completed", title: "All done", msg: "Thanks for choosing B&K General Services. We hope to help again soon." },
    cancelled: { label: "Cancelled", cls: "b-cancelled", title: "This booking was cancelled", msg: "If that's not right, give us a call and we'll sort it out." },
  };
  const FLOW = ["reviewing", "quoted", "paid", "scheduled", "completed"];
  const norm = (s) => (!s || s === "pending" ? "reviewing" : s);

  const money = (c) => (c == null ? null : `$${(c / 100).toFixed(2)}`);
  const fmtDate = (iso) => new Date(iso).toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" });

  function showErr(msg) { const e = $("#formError"); e.textContent = msg; e.classList.add("formerror--show"); }
  function clearErr() { $("#formError").classList.remove("formerror--show"); }

  // Prefill reference from ?ref= in the URL (from the booking confirmation link)
  const params = new URLSearchParams(location.search);
  if (params.get("ref")) $("#ref").value = params.get("ref");

  function renderTimeline(status) {
    const cur = norm(status);
    if (cur === "cancelled") { $("#timeline").style.display = "none"; return; }
    $("#timeline").style.display = "flex";
    const curIdx = FLOW.indexOf(cur);
    $("#timeline").innerHTML = FLOW.map((s, i) => {
      const cls = i < curIdx ? "done" : i === curIdx ? "current" : "";
      const tick = i < curIdx
        ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4L19 6"/></svg>'
        : "";
      return `<div class="tl-step ${cls}"><div class="tl-dot">${tick}</div><div class="tl-label">${STATUS[s].label}</div></div>`;
    }).join("");
  }

  function renderResult(o) {
    const st = STATUS[norm(o.status)] || STATUS.reviewing;
    $("#rSvc").textContent = o.service;
    $("#rRef").textContent = "#" + (o.order_code || "");
    $("#rDate").textContent = o.service_date
      ? `Requested for ${fmtDate(o.service_date)}`
      : `Booked ${fmtDate(o.created_at)}`;
    $("#rBadge").textContent = st.label;
    $("#rBadge").className = "badge " + st.cls;

    renderTimeline(o.status);

    // Quote + pay (only when quoted with a price)
    const price = money(o.price_cents);
    const qb = $("#quoteBox");
    if (norm(o.status) === "quoted" && price) {
      qb.innerHTML = `
        <div class="quote">
          <div class="quote__label">Your quote</div>
          <div class="quote__price">${price}</div>
        </div>
        <div class="paybox">
          <p class="paybox__note">Send <strong>${price}</strong> with an app below, and put your reference <strong>#${o.order_code}</strong> in the payment note so we can match it to your booking. Prefer cash? That works too.</p>
          <div class="paybtns">
            ${o.payment_url ? `<a class="btn btn--pay" href="${o.payment_url}" target="_blank" rel="noreferrer">Pay this exact amount →</a>` : ""}
            <a class="btn btn--venmo" href="${VENMO_URL}" target="_blank" rel="noreferrer">Pay with Venmo</a>
            <a class="btn btn--cashapp" href="${CASHAPP_URL}" target="_blank" rel="noreferrer">Pay with Cash App</a>
            <button type="button" class="btn btn--cash" id="cashBtn">Pay in cash</button>
          </div>
          <div class="cash-note" id="cashNote">No problem — have <strong>${price}</strong> in cash ready when we arrive, and we'll collect it on the day.</div>
        </div>`;
      qb.style.display = "block";
      const cashBtn = $("#cashBtn");
      if (cashBtn) cashBtn.addEventListener("click", () => $("#cashNote").classList.add("cash-note--show"));
    } else if (price && (norm(o.status) === "paid" || norm(o.status) === "scheduled" || norm(o.status) === "completed")) {
      qb.innerHTML = `<div class="quote"><div class="quote__label">Total</div><div class="quote__price">${price}</div></div>`;
      qb.style.display = "block";
    } else {
      qb.innerHTML = "";
      qb.style.display = "none";
    }

    $("#statusBox").innerHTML = `<h3>${st.title}</h3><p>${st.msg}</p>`;

    $("#lookupPanel").style.display = "none";
    $("#resultPanel").classList.add("result--show");
  }

  async function check() {
    clearErr();
    const email = $("#email").value.trim();
    const code = $("#ref").value.trim();
    if (!email || !code) { showErr("Enter your email and reference number."); return; }

    $("#check").disabled = true;
    $("#spinner").style.display = "block";
    $("#checkLabel").textContent = "Checking…";
    try {
      const res = await fetch("/api/order-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, code }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Something went wrong. Please try again.");
      renderResult(data.order);
    } catch (e) {
      showErr(e.message);
    } finally {
      $("#check").disabled = false;
      $("#spinner").style.display = "none";
      $("#checkLabel").textContent = "Check status";
    }
  }

  $("#check").addEventListener("click", check);
  $("#ref").addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
  $("#email").addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });

  $("#again").addEventListener("click", () => {
    $("#resultPanel").classList.remove("result--show");
    $("#lookupPanel").style.display = "block";
    $("#ref").value = "";
  });

  // Forgot reference number → email it to the address on file
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  async function recall() {
    clearErr();
    const email = $("#email").value.trim();
    const note = $("#recallNote");
    if (!EMAIL_RE.test(email)) {
      note.classList.remove("recall-note--show");
      showErr("Enter your email above first, then tap this and we'll send your reference number.");
      return;
    }
    $("#forgotBtn").disabled = true;
    note.textContent = "Sending…";
    note.classList.add("recall-note--show");
    try {
      const res = await fetch("/api/recall-reference", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Something went wrong. Please try again.");
      note.textContent = `If we have bookings for ${email}, we've emailed your reference number(s). Check your inbox (and spam).`;
    } catch (e) {
      note.classList.remove("recall-note--show");
      showErr(e.message);
    } finally {
      $("#forgotBtn").disabled = false;
    }
  }
  $("#forgotBtn").addEventListener("click", recall);
</script>
</body>
</html>
